version: '3.8'
services:
  db:
  image: mysql:8.0
  container_name: mysql_database
  environment:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: devops
  ports:
      "3306:3306"
  healthcheck:
    test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uroot", "-proot"]
    timeout: 10s
    retries: 5
  web:
    build: .
    container_name: flask_application
    ports:
         "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: devops
    depends_on:
      db:
        condition: service_healthy